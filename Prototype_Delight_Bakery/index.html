<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Delight Bakery - Prototype Portal</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF7A00",
                        "primary-container": "#FFF7ED",
                        "on-primary": "#ffffff",
                        "background": "#F9FAFB",
                        "surface": "#ffffff",
                        "on-surface": "#111827",
                        "on-surface-variant": "#6B7280",
                        "outline-variant": "#E5E7EB",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "body": ["Inter", "sans-serif"],
                        "heading": ["Poppins", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <!-- Background Design -->
    <div class="fixed inset-0 bg-bakery z-0 opacity-20"></div>
    <div class="absolute inset-0 bg-gradient-to-br from-primary/10 to-transparent z-0"></div>
    
    <div class="max-w-md w-full bg-surface rounded-2xl shadow-xl overflow-hidden z-10 border border-outline-variant/50">
        <!-- Header -->
        <div class="bg-primary/5 px-8 py-10 text-center border-b border-primary/10">
            <div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-white text-4xl">cake</span>
            </div>
            <h1 class="font-heading text-2xl text-on-surface font-bold">Delight Bakery</h1>
            <p class="text-on-surface-variant text-sm mt-2">Interactive Prototype Portal</p>
        </div>
        
        <!-- Content -->
        <div class="p-8 flex flex-col gap-5">
            <p class="text-center text-sm text-on-surface-variant mb-2">Pilih flow yang ingin dijalankan:</p>
            
            <a href="customer/login.html" class="group flex items-center justify-between bg-white border-2 border-outline-variant hover:border-primary p-4 rounded-xl transition-all duration-300 hover:shadow-md cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-primary-container rounded-full flex items-center justify-center group-hover:bg-primary transition-colors duration-300">
                        <span class="material-symbols-outlined text-primary group-hover:text-white transition-colors">person</span>
                    </div>
                    <div>
                        <h2 class="font-heading font-semibold text-on-surface text-lg">Flow Pelanggan</h2>
                        <p class="text-xs text-on-surface-variant">Katalog, Keranjang, Pesanan</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">chevron_right</span>
            </a>

            <a href="admin/login.html" class="group flex items-center justify-between bg-white border-2 border-outline-variant hover:border-blue-600 p-4 rounded-xl transition-all duration-300 hover:shadow-md cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center group-hover:bg-blue-600 transition-colors duration-300">
                        <span class="material-symbols-outlined text-blue-600 group-hover:text-white transition-colors">admin_panel_settings</span>
                    </div>
                    <div>
                        <h2 class="font-heading font-semibold text-on-surface text-lg">Flow Admin</h2>
                        <p class="text-xs text-on-surface-variant">Dashboard, Kelola Pesanan</p>
                    </div>
                </div>
                <span class="material-symbols-outlined text-on-surface-variant group-hover:text-blue-600 transition-colors">chevron_right</span>
            </a>
        </div>
        
        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center text-xs text-on-surface-variant border-t border-outline-variant">
            &copy; 2026 Delight Bakery
        </div>
    </div>
</body>
</html>
