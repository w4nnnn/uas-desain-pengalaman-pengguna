<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#1E3A8A",
                        "on-primary": "#ffffff",
                        "background": "#F3F4F6",
                        "surface": "#FFFFFF",
                        "on-surface": "#111827",
                        "on-surface-variant": "#6B7280",
                        "outline-variant": "#E5E7EB"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "16px",
                        "stack-lg": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "body": ["Inter", "sans-serif"],
                        "heading": ["Poppins", "sans-serif"]
                    }
                }
            }
        }
    </script>
<link rel="stylesheet" href="../assets/css/global.css">
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-container-margin">
<main class="w-full max-w-[420px] flex flex-col gap-stack-lg">
<!-- Logo Section -->
<header class="flex flex-col items-center gap-3 mb-2">
<div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[36px]">business_center</span>
</div>
<div class="text-center">
<h2 class="text-primary font-bold text-xl tracking-tight">Delight Bakery</h2>
</div>
</header>
<!-- Login Card -->
<section class="bg-surface border border-outline-variant rounded-2xl p-8 shadow-sm">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-on-surface">Login Pemilik</h1>
<p class="text-on-surface-variant text-sm mt-1">Silakan masuk ke akun pengelola Anda</p>
</div>
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-on-surface" for="email">Email / No. HP</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px] group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full bg-surface border border-outline-variant rounded-xl pl-11 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="contoh@email.com" type="text">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="text-sm font-medium text-on-surface" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px] group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="w-full bg-surface border border-outline-variant rounded-xl pl-11 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Submit Button -->
<div class="mt-2">
<button class="w-full bg-primary text-on-primary py-3.5 px-4 rounded-xl font-semibold text-sm hover:bg-opacity-90 active:scale-[0.98] transition-all shadow-md shadow-primary/10 flex items-center justify-center gap-2" type="button" onclick="window.location.href='dashboard.html'">
                        Masuk Ke Dashboard
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</section>
<!-- Footer Info -->
<footer class="text-center">
<p class="text-on-surface-variant text-xs">© 2024 Delight Bakery. Seluruh Hak Cipta Dilindungi.</p>
</footer>
</main>


</body></html>
