<body class="bg-background text-on-background min-h-screen pb-24 md:pb-0 pt-16 md:pt-16 font-body-sm">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-margin h-16 bg-surface border-b border-outline-variant flat no shadows transition-colors duration-200 active:scale-95 text-primary">
<div class="flex items-center gap-4">
<button class="hover:bg-surface-container-high p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface">Pembayaran &amp; DP</h1>
</div>
<div class="flex items-center gap-2">
<button class="hover:bg-surface-container-high p-2 rounded-full flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="max-w-3xl mx-auto p-container-margin md:p-stack-lg space-y-stack-lg pt-24 md:pt-24">
<!-- Rincian Section -->
<section class="bg-surface-container-lowest border border-outline-variant p-stack-md rounded-DEFAULT space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant pb-2">Rincian Tagihan</h2>
<div class="flex justify-between items-center py-2">
<span class="font-body-lg text-body-lg text-on-surface-variant">Subtotal</span>
<span class="font-body-lg text-body-lg font-medium text-on-surface">Rp 500.000</span>
</div>
<div class="flex justify-between items-center py-2 border-t border-outline-variant border-dashed">
<span class="font-body-lg text-body-lg font-bold text-on-surface">Total</span>
<span class="font-body-lg text-body-lg font-bold text-on-surface">Rp 500.000</span>
</div>
<div class="bg-surface-container p-3 flex justify-between items-center border border-outline-variant">
<span class="font-body-sm text-body-sm text-on-surface-variant">Wajib DP (Min 50%)</span>
<span class="font-body-sm text-body-sm font-bold text-on-surface">Rp 250.000</span>
</div>
</section>
<!-- Rekening Section -->
<section class="bg-surface-container-lowest border border-outline-variant p-stack-md rounded-DEFAULT space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface border-b border-outline-variant pb-2">Informasi Rekening</h2>
<div class="space-y-4">
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-1">Bank Tujuan</label>
<div class="font-body-lg text-body-lg text-on-surface p-3 border border-outline-variant bg-surface">Bank BCA</div>
</div>
<div>
<label class="font-label-caps text-label-caps text-on-surface-variant block mb-1">Nomor Rekening</label>
<div class="flex">
<div class="font-body-lg text-body-lg text-on-surface p-3 border border-outline-variant bg-surface flex-1 border-r-0">1234567890</div>
<button class="bg-surface hover:bg-surface-container border border-outline-variant p-3 font-label-caps text-label-caps text-primary flex items-center gap-2 transition-colors">
<span class="material-symbols-outlined">content_copy</span>
                            Salin
                        </button>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">a.n. Delight Bakery Sejahtera</p>
</div>
</div>
</section>
<!-- Upload Area -->
<section class="space-y-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">Bukti Pembayaran</h2>
<div class="border-2 border-dashed border-outline-variant bg-surface hover:bg-surface-container-low transition-colors rounded-DEFAULT h-48 flex flex-col items-center justify-center cursor-pointer group">
<span class="material-symbols-outlined text-4xl text-on-surface-variant mb-2 group-hover:text-primary transition-colors">photo_camera</span>
<span class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-primary transition-colors">Unggah Bukti Transfer</span>
<span class="font-body-sm text-body-sm text-outline mt-1">(JPG, PNG, maks 5MB)</span>
</div>
</section>
<!-- Action Button -->
<div class="pt-stack-md">
<button class="w-full bg-primary text-on-primary font-label-caps text-label-caps py-4 rounded-DEFAULT hover:bg-surface-tint transition-colors uppercase tracking-wider">
                Kirim Bukti Pembayaran
            </button>
</div>
</main>
<script>
        // Simple interactivity for the copy button
        const copyBtn = document.querySelector('button:has(.material-symbols-outlined:contains("content_copy"))');
        if(copyBtn) {
            copyBtn.addEventListener('click', function() {
                const icon = this.querySelector('.material-symbols-outlined');
                const text = this.innerText.replace('content_copy', '').trim();
                
                icon.innerText = 'check';
                this.innerHTML = `<span class="material-symbols-outlined">check</span>Tersalin`;
                this.classList.add('bg-surface-container-highest');
                
                setTimeout(() => {
                    this.innerHTML = `<span class="material-symbols-outlined">content_copy</span>Salin`;
                    this.classList.remove('bg-surface-container-highest');
                }, 2000);
            });
        }
    </script>
