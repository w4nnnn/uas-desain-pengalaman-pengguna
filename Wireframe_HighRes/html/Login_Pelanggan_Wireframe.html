<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Wireframe - Daftar</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e0e3e5",
                        "on-background": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "surface-variant": "#e0e3e5",
                        "outline-variant": "#cfc4c5",
                        "surface-container-low": "#f2f4f6",

                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#161c22",

                        "on-secondary-fixed-variant": "#38485d",

                    "borderRadius": {
                        "DEFAULT": "0.125rem",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-container-margin">
<!-- Main Container: Suppressed Navigation due to Linear/Transactional intent -->
<main class="w-full max-w-sm flex flex-col gap-stack-lg">
<!-- Wireframe Brand Placeholder -->
<div class="w-full h-24 border-2 border-dashed border-outline-variant bg-surface-container flex items-center justify-center rounded-lg">
<span class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2"><span class="material-symbols-outlined text-xl">image</span> Delight Bakery</span>
</div>
<!-- Authentication Card - Blueprint Style -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl flex flex-col overflow-hidden">
<!-- Tab Switcher -->
<div class="flex border-b border-outline-variant">
<!-- Inactive Tab -->
<button class="flex-1 py-stack-md font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200">
                    Masuk
                </button>
<!-- Active Tab -->
<button class="flex-1 py-stack-md font-label-caps text-label-caps text-primary border-b-2 border-primary bg-surface-container-lowest">
                    Daftar
                </button>
</div>
<!-- Form Area -->
<form class="p-container-margin flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Input: Nama Lengkap -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-sm text-body-sm text-on-surface" for="nama">Nama Lengkap</label>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT px-gutter py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline" id="nama" placeholder="Masukkan nama lengkap" type="text">
</div>
<!-- Input: No HP -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-sm text-body-sm text-on-surface" for="nohp">No HP</label>
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT px-gutter py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline" id="nohp" placeholder="Contoh: 081234567890" type="tel">
</div>
<!-- Input: Password -->
<div class="flex flex-col gap-stack-sm">
<label class="font-body-sm text-body-sm text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-transparent border border-outline-variant rounded-DEFAULT pl-gutter pr-10 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary transition-colors placeholder:text-outline" id="password" placeholder="Minimal 8 karakter" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-stack-sm bg-primary text-on-primary py-4 rounded-DEFAULT font-label-caps text-label-caps hover:bg-surface-tint transition-colors duration-200" type="submit">
                    Daftar Sekarang
                </button>
</form>
</div>
<!-- Secondary Action -->
<div class="text-center">
<button class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors duration-200 underline decoration-outline-variant underline-offset-4">
                Lanjutkan sebagai Tamu
            </button>
</div>
</main>


</body></html>
