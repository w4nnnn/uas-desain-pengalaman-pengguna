<!DOCTYPE html>
<html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Delight Bakery</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet">
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#FF7A00",
                        "on-primary": "#ffffff",
                        "background": "#F9FAFB",
                        "surface": "#ffffff",
                        "on-surface": "#111827",
                        "on-surface-variant": "#6B7280",
                        "outline-variant": "#E5E7EB",
                        "primary-container": "#FFF7ED",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "20px",
                        "stack-lg": "32px",
                        "stack-md": "20px",
                        "stack-sm": "12px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body": ["Inter", "sans-serif"],
                        "heading": ["Poppins", "sans-serif"],
                    },
                    "boxShadow": {
                        "soft": "0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)"
                    }
                }
            }
        }
    </script>
<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
body {
    font-family: "Inter", sans-serif
    }
h1, h2, h3, .font-heading {
    font-family: "Poppins", sans-serif
    }
.bg-bakery {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuB3ehubHQZ-N2qOl4wBz6kxkop44XrOU_gEuNhY0g-DfeHjoG_YFrmUlsrtYioqpAisCunWFGAXH1a2a2Ep5L7nAIgfAIlFzZMUEvD528daJoeVbrZxO3O0etevOayirx7IahLpv5V9buBJFqS4uXqh4dar3oGD2MBvLD0d8TLqVvTV602TmR_q8aA7g21IFmMab5p1RArojWuc5redvPO1SJBiqwgAnrQ8LXYz9xa5BsRE8FePnQiStQ);
    background-size: cover;
    background-position: center
    }</style>
</head>
<body class="bg-background text-on-surface min-h-screen relative flex items-center justify-center p-container-margin overflow-hidden">
<!-- Background Image with Overlay -->
<div class="fixed inset-0 bg-bakery z-0">
<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-sm flex flex-col gap-stack-lg relative z-10 animate-in fade-in zoom-in duration-500">
<!-- Brand Logo Area -->
<div class="flex flex-col items-center gap-2">
<div class="w-16 h-16 bg-primary rounded-2xl shadow-lg flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-white text-4xl">bakery_dining</span>
</div>
<h1 class="text-white text-2xl font-bold tracking-tight">Delight Bakery</h1>
<p class="text-white/80 text-sm">Rasa Autentik di Setiap Gigitan</p>
</div>
<!-- Authentication Card -->
<div class="bg-surface shadow-soft rounded-2xl flex flex-col overflow-hidden border border-white/20">
<!-- Tab Switcher -->
<div class="flex border-b border-outline-variant">
<button class="flex-1 py-5 font-heading text-sm font-semibold text-on-surface-variant hover:bg-gray-50 transition-colors duration-200">
                    Masuk
                </button>
<button class="flex-1 py-5 font-heading text-sm font-semibold text-primary border-b-2 border-primary bg-primary-container/30">
                    Daftar
                </button>
</div>
<!-- Form Area -->
<form class="p-8 flex flex-col gap-5" onsubmit="event.preventDefault(); window.location.href='Katalog__PO_High-Fidelity.html';">
<!-- Input: Nama Lengkap -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="nama">Nama Lengkap</label>
<input class="w-full bg-gray-50 border border-outline-variant rounded-xl px-4 py-3.5 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400" id="nama" placeholder="Masukkan nama lengkap" type="text">
</div>
<!-- Input: No HP -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="nohp">No HP</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">+62</span>
<input class="w-full bg-gray-50 border border-outline-variant rounded-xl pl-12 pr-4 py-3.5 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400" id="nohp" placeholder="81234567890" type="tel">
</div>
</div>
<!-- Input: Password -->
<div class="flex flex-col gap-1.5">
<label class="text-xs font-semibold uppercase tracking-wider text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-gray-50 border border-outline-variant rounded-xl px-4 py-3.5 text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400" id="password" placeholder="Minimal 8 karakter" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-on-surface transition-colors p-1" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full mt-2 bg-primary text-white py-4 rounded-xl font-heading text-sm font-bold shadow-lg shadow-primary/20 hover:bg-[#E66E00] active:scale-[0.98] transition-all duration-200" type="submit">
                    Daftar Sekarang
                </button>
<p class="text-[11px] text-center text-on-surface-variant px-2 leading-relaxed">
                    Dengan mendaftar, Anda menyetujui <span class="text-primary font-medium cursor-pointer">Syarat &amp; Ketentuan</span> kami.
                </p>
</form>
</div>
<!-- Secondary Action -->
<div class="text-center">
<button class="font-medium text-sm text-white/90 hover:text-white transition-colors duration-200 flex items-center justify-center gap-2 mx-auto bg-white/10 backdrop-blur-md px-6 py-2.5 rounded-full border border-white/10">
                Lanjutkan sebagai Tamu
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer Decoration -->
<div class="fixed bottom-6 text-white/40 text-[10px] uppercase tracking-widest pointer-events-none">© 2024 Delight Bakery Co.</div>


</body></html>

<!-- Detail Pesanan Admin (High-Fidelity) -->
